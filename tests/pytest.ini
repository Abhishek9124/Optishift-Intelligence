[pytest]
# Pytest configuration for Leave Management System tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -ra

# Markers for different test cases
markers =
    tc01: TC-01 - Load 500K leave records, verify schema
    tc02: TC-02 - Data cleaning removes duplicates
    tc03: TC-03 - Feature engineering produces 50 features
    tc04: TC-04 - XGBoost model trains in <5 min
    tc05: TC-05 - Forecast generates 60-day predictions
    tc06: TC-06 - Streamlit dashboard loads <5 seconds
    tc07: TC-07 - Date range filtering updates visualizations
    tc08: TC-08 - Model accuracy maintained (WAPE <15%)
    tc09: TC-09 - No data leakage in train/test split
    tc10: TC-10 - Confidence intervals calculated correctly

# Test timeout (seconds)
timeout = 300

# Minimum Python version
minversion = 3.8

# Console output settings
console_output_style = progress

# Coverage options (if using pytest-cov)
# --cov=.. --cov-report=html --cov-report=term-missing
